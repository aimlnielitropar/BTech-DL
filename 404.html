<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
        }
        .serif {
            font-family: 'Playfair Display', serif;
        }
        .bg-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");

            position: relative;
        }

            background: linear-gradient(to bottom, #eeeeee, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            user-select: none;

<body class="bg-pattern flex items-center justify-center min-h-screen p-6">

    <div class="max-w-3xl w-full text-center relative">
        <!-- Large Background Number -->
        <div class="absolute inset-0 flex items-center justify-center -z-10 opacity-50">
            <span class="number-bg">404</span>
        </div>

        <div class="space-y-8">
            <!-- Branding -->
            <div class="inline-block px-4 py-1 border-b-2 border-black mb-4">
                <span class="uppercase tracking-[0.3em] text-sm font-medium">Sarwan Singh</span>
            </div>

            <!-- Main Heading -->
            <h1 class="serif text-5xl md:text-7xl text-gray-900 leading-tight">
                You've wandered off <br> the expected path.
            </h1>

            <p class="text-gray-500 text-lg md:text-xl max-w-lg mx-auto font-light leading-relaxed">
                The page you're looking for doesn't exist or has been moved. Let's get you back to where you need to be.
            </p>

            <!-- Navigation Actions -->
            <div class="flex flex-col sm:flex-row items-center justify-center gap-6 pt-4">
                <a href="/" class="group flex items-center gap-2 text-black font-semibold hover:opacity-70 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    Return Home
                </a>
                
                <div class="hidden sm:block w-px h-6 bg-gray-300"></div>

                <a href="/contact" class="px-8 py-3 bg-black text-white rounded-full hover:bg-gray-800 transition-all shadow-lg shadow-black/10">
                    Get in Touch
                </a>
            </div>

            <!-- Quick Links Footer -->
            <div class="pt-20">
                <p class="text-xs uppercase tracking-widest text-gray-400 mb-6">Useful Links</p>
                <div class="flex flex-wrap justify-center gap-x-8 gap-y-4 text-sm font-medium text-gray-600">
                    <a href="/about" class="hover:text-black transition-colors">About</a>
                    <a href="/projects" class="hover:text-black transition-colors">Projects</a>
                    <a href="/blog" class="hover:text-black transition-colors">Blog</a>
                    <a href="/resume" class="hover:text-black transition-colors">Resume</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Minimal Bottom Decoration -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 text-gray-300 text-[10px] uppercase tracking-[0.5em] whitespace-nowrap">
        Authentic • Professional • Reliable
    </div>

</html>
